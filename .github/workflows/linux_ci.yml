name: ninja2-CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 配置 apt 使用更快的镜像源（可选，根据地域选择）
      - name: Configure apt to use faster mirrors
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list
          sudo apt-get update

      # 3. 缓存 apt 包
      - name: Cache apt packages
        uses: actions/cache@v3
        with:
          path: |
            /var/cache/apt
            /var/lib/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('**/build.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      # 4. 安装依赖
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake g++ gcc googletest libgmock-dev libgoogle-glog-dev libssl-dev pkg-config uuid-dev grpc++ libprotobuf-dev protobuf-compiler-grpc ninja-build libyaml-cpp-dev

      # 5. 缓存 CMake 和构建产物（可选）
      - name: Cache CMake and build
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache
            build
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      # 6. 运行构建脚本
      - name: Build ninja2
        run: |
          chmod +x build.sh
          ./build.sh build

      # 7. 安装构建好的 ninja
      - name: Install ninja
        run: |
          sudo ./build.sh install

      # 8. 验证 ninja 安装
      - name: Verify ninja installation
        run: |
          ninja --version

